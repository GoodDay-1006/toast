<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOOD DAY 點餐系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{--red:#7D2020;--red2:#A33030;--cream:#FFF8F0;--warm:#F5E6D3;--text:#2C1810;--accent:#E8B86D;--green:#2E7D32;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Serif TC',serif;background:var(--cream);color:var(--text);min-height:100vh;}
  header{background:var(--red);color:white;padding:18px 20px 14px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 3px 12px rgba(0,0,0,.25);}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:4px;color:var(--accent);cursor:default;user-select:none;}
  header p{font-size:.75rem;opacity:.85;margin-top:2px;}
  .hours{background:var(--accent);color:var(--red);font-size:.7rem;font-weight:700;padding:3px 12px;border-radius:20px;display:inline-block;margin-top:6px;}
  .tabs{display:flex;gap:8px;padding:14px 16px;overflow-x:auto;background:var(--warm);border-bottom:2px solid #E8D5C0;scrollbar-width:none;}
  .tab{flex-shrink:0;padding:7px 18px;border-radius:20px;border:2px solid var(--red);background:transparent;color:var(--red);font-family:'Noto Serif TC',serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;}
  .tab.active{background:var(--red);color:white;}
  .section{display:none;padding:16px;}
  .section.visible{display:block;}
  .section-title{font-size:1.1rem;font-weight:900;color:var(--red);margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--accent);}
  .items{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .item{background:white;border-radius:12px;padding:14px 12px;border:1.5px solid #EDD8C0;display:flex;flex-direction:column;gap:6px;box-shadow:0 2px 6px rgba(0,0,0,.06);}
  .item-name{font-size:.95rem;font-weight:700;}
  .item-price{font-size:1.05rem;font-weight:900;color:var(--red);}
  .item-controls{display:flex;align-items:center;gap:6px;margin-top:4px;}
  .qty-btn{width:30px;height:30px;border-radius:50%;border:2px solid var(--red);background:transparent;color:var(--red);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .qty-display{font-size:1.05rem;font-weight:700;min-width:26px;text-align:center;}
  .cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--red);color:white;padding:14px 20px;z-index:200;transform:translateY(100%);transition:transform .3s ease;}
  .cart-bar.visible{transform:translateY(0);}
  .cart-bar-inner{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .cart-count{background:var(--accent);color:var(--red);border-radius:50%;width:22px;height:22px;font-size:.75rem;font-weight:900;display:inline-flex;align-items:center;justify-content:center;margin-left:6px;}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:300;align-items:flex-end;}
  .overlay.open{display:flex;}
  .sheet{background:var(--cream);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px 32px;}
  .sheet-title{font-size:1.15rem;font-weight:900;color:var(--red);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
  .x-btn{background:#E8D5C0;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .cart-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #E8D5C0;gap:8px;}
  .cart-row-info{flex:1;}
  .cart-row-price{font-weight:900;color:var(--red);font-size:1rem;}
  .cart-row-controls{display:flex;align-items:center;gap:4px;}
  .c-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--red);background:transparent;color:var(--red);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .field-group{margin-top:14px;}
  .field-label{font-size:.85rem;font-weight:700;color:var(--red);margin-bottom:6px;display:block;}
  .field-row{display:flex;gap:8px;}
  input[type="date"],select,textarea{font-family:'Noto Serif TC',serif;font-size:.9rem;padding:8px 12px;border:1.5px solid #EDD8C0;border-radius:10px;width:100%;}
  .submit-btn{width:100%;margin-top:14px;padding:15px;background:var(--green);color:white;border:none;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer;letter-spacing:2px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .submit-btn:disabled{background:#aaa;}
  .clear-btn{width:100%;margin-top:8px;padding:10px;background:transparent;color:#bbb;border:1px solid #ddd;border-radius:12px;cursor:pointer;}
  .success-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center;padding:20px;}
  .success-wrap.open{display:flex;}
  .success-box{background:white;border-radius:20px;padding:28px 22px;text-align:center;width:100%;max-width:360px;max-height:88vh;overflow-y:auto;}
  .s-num{font-family:'Bebas Neue',sans-serif;font-size:4rem;color:var(--red);letter-spacing:4px;}
  .s-detail{font-size:.76rem;color:#555;margin-top:10px;line-height:1.75;text-align:left;background:#f9f4ef;border-radius:10px;padding:10px 12px;}
  .send-status{margin-top:12px;padding:12px;border-radius:10px;font-size:.85rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;}
  .send-status.sending{background:#FFF8E1;color:#F57F17;}
  .send-status.success{background:#E8F5E9;color:#2E7D32;}
  .send-status.failed{background:#FFEBEE;color:#C62828;}
  .done-btn{margin-top:12px;padding:13px;background:var(--red);color:white;border:none;border-radius:12px;width:100%;cursor:pointer;}
  .admin-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;overflow-y:auto;padding:24px 0;}
  .admin-wrap.open{display:block;}
  .admin-box{background:white;border-radius:16px;width:95%;max-width:500px;padding:20px;margin:auto;}
  .webhook-section{background:var(--warm);border-radius:12px;padding:14px;margin-bottom:18px;}
  .test-btn{margin-top:8px;padding:8px 16px;background:var(--red);color:white;border:none;border-radius:8px;cursor:pointer;}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <h1 id="logoTap" onclick="tapLogo()">🍞 GOOD DAY</h1>
  <p id="userName">Tea & Toast — 線上點餐</p>
  <div class="hours">週一至週六　AM 6:00 – 10:00</div>
</header>

<div class="tabs" id="tabs"></div>
<div id="menuSections"></div>
<div class="spacer" style="height:80px;"></div>

<div class="cart-bar" id="cartBar" onclick="openCart()">
  <div class="cart-bar-inner">
    <div>🛒 購物車 <span class="cart-count" id="cartCount">0</span></div>
    <div style="font-size:1.1rem;font-weight:700;" id="cartBarTotal">$0</div>
  </div>
</div>

<div class="overlay" id="cartOverlay">
  <div class="sheet">
    <div class="sheet-title"><span>🛒 確認訂單</span><button class="x-btn" onclick="closeCart()">✕</button></div>
    <div id="cartRows"></div>
    <div class="field-group"><label class="field-label">📅 取餐日期 <span class="req">*</span></label><input type="date" id="pickupDate"></div>
    <div class="field-group">
      <label class="field-label">⏰ 取餐時間 <span class="req">*</span></label>
      <div class="field-row"><select id="pickupHour" onchange="updateMins()"></select><select id="pickupMin"></select></div>
    </div>
    <div class="field-group"><label class="field-label">📝 備註</label><textarea id="orderNote" placeholder="例如：不加辣..."></textarea></div>
    <div style="margin-top:16px;padding-top:12px;display:flex;justify-content:space-between;font-size:1.1rem;font-weight:900;border-top:2px solid var(--accent);">
      <span>總計</span><span id="cartTotal" style="color:var(--red)">$0</span>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitOrder()">送出訂單</button>
    <button class="clear-btn" onclick="clearCart()">清空購物車</button>
  </div>
</div>

<div class="success-wrap" id="successWrap">
  <div class="success-box">
    <div style="font-size:2.8rem">🎉</div>
    <div style="font-size:.72rem;color:#aaa">您的訂單編號</div>
    <div class="s-num" id="sNum">---</div>
    <div style="font-size:1rem;font-weight:700;" id="sTitle">訂單已送出！</div>
    <div class="s-detail" id="sDetail"></div>
    <div class="send-status sending" id="sendStatus">正在傳送到店家 LINE…</div>
    <button class="done-btn" onclick="closeDone()">✓ 完成</button>
  </div>
</div>

<div class="admin-wrap" id="adminWrap">
  <div class="admin-box">
    <h2 style="display:flex;justify-content:space-between">⚙️ 菜單管理 <button class="x-btn" onclick="closeAdmin()">✕</button></h2>
    <div class="webhook-section">
      <h3 style="font-size:.9rem;color:var(--red)">🔗 LINE 自動通知設定</h3>
      <input type="text" id="webhookUrl" placeholder="貼上 GAS 網址" oninput="saveWebhook()" style="width:100%;padding:8px;margin-top:5px;border-radius:8px;border:1.5px solid #EDD8C0">
      <button class="test-btn" onclick="testWebhook()">🔔 測試傳送</button>
    </div>
    <div id="adminContent"></div>
    <button onclick="saveAdmin()" style="width:100%;padding:12px;background:var(--red);color:white;border:none;border-radius:10px;font-weight:700;margin-top:10px;cursor:pointer">💾 儲存並更新菜單</button>
  </div>
</div>

<script>
const LIFF_ID = '2009741658-E1Z86q0b'; //
const DEFAULT = {
  toast:{ label:'🍞 吐司類', items:[{id:'T1',name:'蛋吐司',price:30},{id:'T4',name:'肉蛋吐司',price:60}]},
  crepe:{ label:'🥚 粉漿蛋餅', items:[{id:'C1',name:'原味蛋餅',price:30},{id:'C4',name:'豬排蛋餅',price:55}]},
  drink:{ label:'🧋 飲料', items:[{id:'D1',name:'紅茶',price:15},{id:'D2',name:'奶茶',price:25}]},
};

let MENU=(()=>{try{const s=localStorage.getItem('gd_menu');return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT));}catch(e){return JSON.parse(JSON.stringify(DEFAULT));}})();
let qty={};

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); }
    else {
      const p = await liff.getProfile();
      document.getElementById('userName').innerText = `你好 ${p.displayName}，準備好點餐了嗎？`;
    }
  } catch (e) { console.error(e); }
}

function getWebhook(){return localStorage.getItem('gd_webhook')||'';}
function saveWebhook(){localStorage.setItem('gd_webhook',document.getElementById('webhookUrl').value.trim());}

async function sendToLine(msg){
  const url=getWebhook(); if(!url) return 'no_webhook';
  try{
    const res=await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    return 'ok'; 
  }catch(e){return 'error';}
}

async function submitOrder(){
  const cart=getCart(); if(!cart.length){alert('請選擇商品');return;}
  const date=document.getElementById('pickupDate').value;
  const time=`${date} ${document.getElementById('pickupHour').value}:${document.getElementById('pickupMin').value.padStart(2,'0')}`;
  const num=nextNum(); const total=totalPrice(); const note=document.getElementById('orderNote').value.trim();
  
  const lineMsg=`🍞 新訂單 #${num}\n⏰ 時間：${time}\n──────────────────\n` + cart.map(i=>`${i.name} x${i.q}`).join('\n') + `\n──────────────────\n💰 總計：$${total}${note?'\n📝 備註：'+note:''}`;

  const statusEl=document.getElementById('sendStatus');
  statusEl.className='send-status sending'; statusEl.innerHTML='正在傳送中...';
  
  document.getElementById('sNum').textContent=num;
  document.getElementById('sDetail').innerHTML=`<b>訂單 #${num}</b><br>時間：${time}<br>總計：$${total}`;
  document.getElementById('successWrap').classList.add('open');
  closeCart();

  // LIFF 發送訊息給自己
  if (liff.isInClient()) {
    await liff.sendMessages([{type:'text',text:lineMsg}]).catch(e=>console.error(e));
  }

  const res = await sendToLine(lineMsg);
  statusEl.className = res==='ok'?'send-status success':'send-status failed';
  statusEl.innerHTML = res==='ok'?'✅ 已傳送到店家 LINE':'❌ 傳送失敗，請截圖';
  clearCart();
}

function nextNum(){let cnt=parseInt(localStorage.getItem('gd_cnt')||'9')+1;localStorage.setItem('gd_cnt',cnt);return String(cnt).padStart(3,'0');}
function renderMenu(){
  const tabsEl=document.getElementById('tabs'); const secsEl=document.getElementById('menuSections');
  tabsEl.innerHTML=''; secsEl.innerHTML='';
  Object.keys(MENU).forEach((cat,idx)=>{
    const btn=document.createElement('button'); btn.className='tab'+(idx===0?' active':''); btn.textContent=MENU[cat].label;
    btn.onclick=()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));document.getElementById('sec-'+cat).classList.add('visible');};
    tabsEl.appendChild(btn);
    const sec=document.createElement('div'); sec.className='section'+(idx===0?' visible':''); sec.id='sec-'+cat;
    sec.innerHTML=`<div class="section-title">${MENU[cat].label}</div><div class="items">`+MENU[cat].items.map(i=>`<div class="item"><div class="item-name">${i.name}</div><div class="item-price">$${i.price}</div><div class="item-controls"><button class="qty-btn" onclick="addQty('${i.id}',-1)">−</button><span class="qty-display" id="qd-${i.id}">${qty[i.id]||0}</span><button class="qty-btn" onclick="addQty('${i.id}',1)">＋</button></div></div>`).join('')+`</div>`;
    secsEl.appendChild(sec);
  });
}
function addQty(id,d){qty[id]=Math.max(0,(qty[id]||0)+d);document.getElementById('qd-'+id).textContent=qty[id];updateBar();}
function getCart(){return Object.values(MENU).flatMap(c=>c.items).filter(i=>qty[i.id]>0).map(i=>({...i,q:qty[i.id],sub:i.price*qty[i.id]}));}
function totalPrice(){return getCart().reduce((a,b)=>a+b.sub,0);}
function updateBar(){const n=getCart().reduce((a,b)=>a+b.q,0);document.getElementById('cartCount').textContent=n;document.getElementById('cartBarTotal').textContent='$'+totalPrice();document.getElementById('cartBar').classList.toggle('visible',n>0);}
function initTime(){
  const hEl=document.getElementById('pickupHour'); for(let h=6;h<=10;h++){const o=document.createElement('option');o.value=h;o.textContent=h+'點';hEl.appendChild(o);}
  hEl.value=7; updateMins();
}
function updateMins(){const mEl=document.getElementById('pickupMin');mEl.innerHTML='';for(let m=0;m<=50;m+=10){const o=document.createElement('option');o.value=m;o.textContent=m+'分';mEl.appendChild(o);}}
function openCart(){
  const rows=getCart().map(i=>`<div class="cart-row"><div class="cart-row-info"><b>${i.name}</b></div><div class="cart-row-price">$${i.sub}</div></div>`).join('');
  document.getElementById('cartRows').innerHTML=rows||'<div style="text-align:center;padding:20px;color:#ccc">空空的</div>';
  document.getElementById('cartTotal').textContent='$'+totalPrice();
  document.getElementById('cartOverlay').classList.add('open');
}
function closeCart(){document.getElementById('cartOverlay').classList.remove('open');}
function clearCart(){qty={};document.querySelectorAll('.qty-display').forEach(e=>e.textContent=0);updateBar();}
function closeDone(){document.getElementById('successWrap').classList.remove('open');}
function tapLogo(){tapCount=(window.tapCount||0)+1;if(tapCount>=5){window.tapCount=0;openAdmin();}setTimeout(()=>window.tapCount=0,2000);}
function openAdmin(){document.getElementById('webhookUrl').value=getWebhook();document.getElementById('adminWrap').classList.add('open');}
function closeAdmin(){document.getElementById('adminWrap').classList.remove('open');}
function saveAdmin(){alert('儲存成功');closeAdmin();}

initLiff(); renderMenu(); initTime();
</script>
</body>
</html>
